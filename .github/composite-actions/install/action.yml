name: 'Install'
description: 'Sets up Node.js and runs install'

inputs:
  npm-token:
    description: 'A read-only npm token'
    required: true
  vercel-private-registry-token:
    description: 'A token used to access the Vercel Private Registry'
    required: true
  node-version-file:
    description: 'A custom node version'
    required: false
    default: '.nvmrc'
  node-version:
    description: 'The version of node, should be 16 or 20'
    default: '20'
    required: false
  filter:
    description: 'A list of pnpm filters - see https://pnpm.io/filtering'
    required: false
    default: ''


runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: ${{ inputs.node-version-file }}
        registry-url: 'https://registry.npmjs.org'

    - name: "Install corepack v0.20"
      if: ${{ inputs.node-version == '16' }}
      shell: bash
      run: |
        echo "corepack version before: $(corepack --version)"
        # 0.20 is the highest we can go, 0.20 drops node 16 support
        # https://github.com/nodejs/corepack/blob/main/CHANGELOG.md#0210-2023-10-08
        npm install -g corepack@0.20
        echo "corepack version after: $(corepack --version)"

    - name: "Install corepack@0.31"
      if: ${{ inputs.node-version != '16' }}
      shell: bash
      run: |
        npm install -g corepack@0.31
        echo "corepack version after: $(corepack --version)"

    - name: corepack enable (pnpm)
      shell: bash
      run: corepack enable
    - name: Print pnpm version
      shell: bash
      run: |
        echo "pnpm version after corepack enable: $(pnpm --version)"

    - name: Parse filter
      id: parse-filter
      shell: bash
      env:
        FILTER: ${{ inputs.filter }}
      run: |
        # Emit a JSON array of arguments, e.g. ["--filter","a","--filter","b"].
        # Using a JSON array (rather than a space-joined string) means the Install
        # step can deserialize it into a bash array and expand each element with
        # proper quoting, preventing shell metacharacters in filter names from
        # being interpreted as commands.
        args_json=$(jq -rn --arg filter "$FILTER" \
          '[$filter | split(" ") | .[] | select(. != "")] | map(["--filter", .]) | flatten | @json')
        echo "pnpm-filter-args=$args_json" >> "$GITHUB_OUTPUT"

    - name: Install dependencies
      shell: bash
      run: |
        pnpm config set //vercel-private-registry.vercel.sh/:_authToken "$VERCEL_PRIVATE_REGISTRY_TOKEN"
        # Deserialize the JSON array into a bash array so each argument is a
        # separate quoted token. This prevents any shell metacharacters that
        # might appear in a filter name from being interpreted by the shell.
        mapfile -t filter_args < <(jq -r '.[]' <<< "$PNPM_FILTER_ARGS_JSON")
        pnpm "${filter_args[@]}" install --frozen-lockfile
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm-token }}
        VERCEL_PRIVATE_REGISTRY_TOKEN: ${{ inputs.vercel-private-registry-token }}
        PNPM_FILTER_ARGS_JSON: ${{ steps.parse-filter.outputs.pnpm-filter-args }}
